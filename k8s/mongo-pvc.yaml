apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: devops-hub
  labels:
    app: mongo
spec:
  accessModes:
    - ReadWriteOnce        # one node can read/write at a time
  resources:
    requests:
      storage: 1Gi         # 1GB storage for MongoDB data
  storageClassName: standard